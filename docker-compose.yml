services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-poker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-poker}
      POSTGRES_DB: ${POSTGRES_DB:-planning_poker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poker}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-poker}:${POSTGRES_PASSWORD:-poker}@postgres:5432/${POSTGRES_DB:-planning_poker}
      PORT: 3001
      STATIC_DIR: /app/dist
    ports:
      - "${APP_PORT:-3001}:3001"

volumes:
  postgres_data:
